<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>🔱 Trishul Pro — Home</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Rajdhani:wght@600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
:root{--gold:#f5c518;--bg:#000;--bg2:#0a0a0a;--bg3:#121212;--border:#222;--bordergold:#3d3000;--text:#eee;--dim:#888;--green:#00c853;--red:#ff3d3d;}
html,body{height:100%;background:#000;overflow:hidden;}
/* WRAPPER */
.wrap{width:100%;max-width:430px;height:100vh;height:100dvh;margin:0 auto;display:flex;flex-direction:column;border:2px solid var(--gold);background:#000;position:relative;}
/* SCROLL AREA */
.scroller{flex:1;min-height:0;overflow-y:auto;overflow-x:hidden;scrollbar-width:none;}
.scroller::-webkit-scrollbar{display:none;}
/* BOTTOM NAV */
.bnav{flex-shrink:0;width:100%;display:flex;background:#0a0a0a;border-top:2px solid var(--gold);}
.ni{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-decoration:none;padding:7px 2px 5px;gap:2px;min-height:52px;}
.ni:active{background:#1a1600;}
.ni-ico{font-size:18px;line-height:1;}
.ni-lbl{font-size:8px;color:var(--dim);font-weight:700;letter-spacing:0.5px;font-family:'Rajdhani',sans-serif;}
.ni.act .ni-lbl{color:var(--gold);}
.ni.act .ni-ico{filter:drop-shadow(0 0 5px var(--gold));}
/* EXIT BTN */
.xbtn{position:absolute;top:8px;right:8px;width:30px;height:30px;background:linear-gradient(135deg,#8b0000,#ff3d3d);border:2px solid #ff8888;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;cursor:pointer;z-index:50;}
/* TICKER */
.ticker{height:22px;background:#05050f;border-bottom:1px solid #f5c51825;overflow:hidden;display:flex;align-items:center;}
.tick-inner{display:flex;white-space:nowrap;animation:tick 30s linear infinite;}
@keyframes tick{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
.ti{padding:0 14px;font-size:10px;font-weight:600;color:#555;font-family:'Rajdhani',sans-serif;}
.up{color:#00c853;}.dn{color:#ff3d3d;}
/* TITLE */
.title-bar{margin:5px 6px 0;border:2px solid var(--gold);padding:7px 10px;display:flex;align-items:center;justify-content:center;gap:10px;background:#050510;position:relative;}
.title-txt{font-family:'Orbitron',sans-serif;font-size:16px;font-weight:900;color:var(--gold);letter-spacing:3px;}
/* GEMINI */
.gbar{background:#05050f;border-bottom:1px solid #1a1500;padding:3px 8px;display:flex;align-items:center;gap:5px;}
.gdot{width:6px;height:6px;background:#00c853;border-radius:50%;animation:blink 1s infinite;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.3}}
.gtxt{font-size:9px;color:#555;flex:1;overflow:hidden;white-space:nowrap;font-family:'Rajdhani',sans-serif;}
/* INDICES */
.idx-row{display:grid;grid-template-columns:repeat(4,1fr);gap:3px;margin:5px 6px 0;}
.ibox{background:#121212;border:1px solid #222;padding:6px 3px;text-align:center;cursor:pointer;}
.ibox:active{border-color:var(--gold);}
.i-name{font-size:8px;color:var(--dim);font-family:'Rajdhani',sans-serif;}
.i-val{font-size:12px;font-weight:700;color:var(--text);font-family:'Orbitron',sans-serif;}
.i-chg{font-size:9px;font-family:'Rajdhani',sans-serif;}
/* QUICK */
.qrow{display:grid;grid-template-columns:repeat(5,1fr);gap:3px;margin:4px 6px 0;}
.qbox{background:#121212;border:1px solid #222;padding:5px 2px;text-align:center;}
.q-lbl{font-size:7px;color:var(--dim);font-family:'Rajdhani',sans-serif;}
.q-val{font-size:11px;font-weight:700;color:var(--gold);font-family:'Orbitron',sans-serif;}
.q-note{font-size:8px;color:#00c853;font-family:'Rajdhani',sans-serif;}
/* SECTOR */
.sec-hd{padding:4px 8px 2px;font-size:9px;color:var(--dim);letter-spacing:1.5px;font-weight:700;font-family:'Rajdhani',sans-serif;}
.sec-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:2px;margin:0 6px 6px;}
.sbox{border:1px solid transparent;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:7px 2px;cursor:pointer;}
.sbox:active{filter:brightness(1.4);}
.s-nm{font-size:11px;font-weight:700;color:#fff;font-family:'Rajdhani',sans-serif;}
.s-st{font-size:9px;display:flex;gap:5px;}
.sup{color:#00ff88;}.sdn{color:#ff8888;}
.c0{background:#0a3a1a;border-color:#00c853!important;}.c1{background:#083018;border-color:#009940!important;}
.c2{background:#082818;border-color:#007030!important;}.c3{background:#0a2010;border-color:#005020!important;}
.c4{background:#101800;border-color:#304000!important;}.c5{background:#181200;border-color:#403000!important;}
.c6{background:#200a00;border-color:#602000!important;}.c7{background:#2a0600;border-color:#801000!important;}
.c8{background:#300400;border-color:#990800!important;}.c9{background:#380200;border-color:#bb0404!important;}
.c10{background:#3a0000;border-color:#cc0000!important;}.c11{background:#3d0000;border-color:#dd0000!important;}
/* MODAL */
.mbg{position:fixed;inset:0;background:rgba(0,0,0,0.93);display:none;align-items:center;justify-content:center;z-index:200;}
.mbg.show{display:flex;}
.mbox{background:#0a0a0a;border:2px solid var(--gold);width:calc(100% - 32px);max-width:380px;padding:14px;}
.mhd{display:flex;justify-content:space-between;align-items:center;padding-bottom:10px;border-bottom:1px solid #3d3000;margin-bottom:12px;}
.mtitle{font-family:'Orbitron',sans-serif;font-size:13px;color:var(--gold);}
.mclose{background:none;border:1px solid #222;color:var(--dim);font-size:18px;cursor:pointer;width:28px;height:28px;display:flex;align-items:center;justify-content:center;}
.ogrid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.obox{background:#050505;border:1px solid #222;padding:12px;text-align:center;}
.olbl{font-size:9px;color:var(--dim);margin-bottom:4px;font-family:'Rajdhani',sans-serif;}
.oval{font-size:20px;font-weight:700;font-family:'Orbitron',sans-serif;}
/* DRILL */
.drill{position:fixed;inset:0;background:#000;display:none;flex-direction:column;z-index:150;max-width:430px;margin:0 auto;}
.drill.show{display:flex;}
.dhd{background:#0c0c18;border-bottom:2px solid var(--gold);padding:12px 14px;display:flex;align-items:center;gap:12px;flex-shrink:0;}
.dback{font-size:22px;cursor:pointer;color:var(--gold);}
.dtitle{font-family:'Orbitron',sans-serif;font-size:14px;color:var(--gold);}
.dlist{flex:1;overflow-y:auto;padding:6px;scrollbar-width:none;}
.dlist::-webkit-scrollbar{display:none;}
.ditem{display:flex;justify-content:space-between;align-items:center;padding:10px 12px;margin-bottom:4px;border:1px solid transparent;}
.dg{background:#083018;border-color:#009940!important;}
.dr{background:#300400;border-color:#880000!important;}
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:#121212;border:1px solid #3d3000;padding:8px 16px;font-size:11px;color:#eee;z-index:999;display:none;white-space:nowrap;font-family:'Rajdhani',sans-serif;}
.toast.show{display:block;}
</style>
</head>
<body>
<div class="wrap">
  <div class="scroller">
    <div class="gbar"><div class="gdot"></div><div class="gtxt">🤖 GEMINI AI · All 9 Scanners Active · AWS Mumbai OK</div></div>
    <div class="title-bar">
      <div class="xbtn" onclick="doLogout()">⏻</div>
      <span style="font-size:20px">🔱</span><span class="title-txt">TRISHUL PRO</span><span style="font-size:20px">🔱</span>
    </div>
    <div class="ticker"><div class="tick-inner" id="tickEl"></div></div>
    <div class="idx-row" id="idxRow"></div>
    <div class="qrow" id="qRow"></div>
    <div class="sec-hd">▦ SECTOR HEATMAP</div>
    <div class="sec-grid" id="secGrid"></div>
  </div>
  <nav class="bnav">
    <a class="ni act" href="page2_home.html"><div class="ni-ico">🏠</div><div class="ni-lbl">HOME</div></a>
    <a class="ni" href="page3_signal.html"><div class="ni-ico">📡</div><div class="ni-lbl">SIGNAL</div></a>
    <a class="ni" href="page4_power.html"><div class="ni-ico">⚡</div><div class="ni-lbl">POWER</div></a>
    <a class="ni" href="page5_chart.html"><div class="ni-ico">📊</div><div class="ni-lbl">CHART</div></a>
    <a class="ni" href="page6_watchlist.html"><div class="ni-ico">⭐</div><div class="ni-lbl">WATCH</div></a>
    <a class="ni" href="page7_admin.html"><div class="ni-ico">⚙️</div><div class="ni-lbl">ADMIN</div></a>
  </nav>
</div>
<!-- OHLC MODAL -->
<div class="mbg" id="idxM" onclick="cm('idxM')">
  <div class="mbox" onclick="event.stopPropagation()">
    <div class="mhd"><div class="mtitle" id="mNm">NIFTY</div><button class="mclose" onclick="cm('idxM')">✕</button></div>
    <div class="ogrid">
      <div class="obox"><div class="olbl">OPEN</div><div class="oval" id="mO"></div></div>
      <div class="obox"><div class="olbl">HIGH</div><div class="oval up" id="mH"></div></div>
      <div class="obox"><div class="olbl">LOW</div><div class="oval dn" id="mL"></div></div>
      <div class="obox"><div class="olbl">PREV</div><div class="oval" id="mP"></div></div>
    </div>
  </div>
</div>
<!-- DRILL -->
<div class="drill" id="drillEl">
  <div class="dhd"><span class="dback" onclick="document.getElementById('drillEl').classList.remove('show')">←</span><span class="dtitle" id="dNm"></span></div>
  <div class="dlist" id="dList"></div>
</div>
<div class="toast" id="toast"></div>
<script>
const IDX=[
  {n:'NIFTY 50',v:24150,c:145,p:0.61,o:24005,h:24210,l:23980,pr:24005},
  {n:'BANKNIFTY',v:51320,c:280,p:0.55,o:51040,h:51480,l:50890,pr:51040},
  {n:'SENSEX',v:79850,c:420,p:0.53,o:79430,h:80020,l:79300,pr:79430},
];
const QK=[{l:'VIX',v:'14.5',n:'LOW'},{l:'PCR',v:'0.85',n:'NTRL'},{l:'FII',v:'+2.1K',n:'BUY'},{l:'DII',v:'+1.4K',n:'BUY'},{l:'ADV',v:'1842',n:'▲'}];
const SECS=[
  {n:'REALTY',u:9,d:0,c:'c0'},{n:'BANKING',u:8,d:1,c:'c1'},{n:'IT',u:7,d:2,c:'c2'},
  {n:'AUTO',u:6,d:1,c:'c3'},{n:'FINANCE',u:5,d:1,c:'c3'},{n:'CHEMICAL',u:6,d:2,c:'c4'},
  {n:'POWER',u:4,d:4,c:'c5'},{n:'INFRA',u:3,d:3,c:'c5'},{n:'TELECOM',u:2,d:2,c:'c6'},
  {n:'CEMENT',u:2,d:4,c:'c7'},{n:'CONSUMER',u:3,d:5,c:'c8'},{n:'FMCG',u:3,d:6,c:'c9'},
  {n:'ENERGY',u:1,d:5,c:'c10'},{n:'MEDIA',u:1,d:5,c:'c10'},{n:'PSU BANK',u:2,d:6,c:'c11'},
  {n:'PHARMA',u:2,d:7,c:'c11'},{n:'OIL&GAS',u:2,d:7,c:'c11'},{n:'METAL',u:1,d:8,c:'c11'},
];
const SS={BANKING:[{n:'HDFC BANK',p:1678,c:0.8},{n:'ICICI BANK',p:1245,c:1.5},{n:'SBI',p:789,c:0.6},{n:'AXIS',p:1123,c:0.5}],IT:[{n:'TCS',p:3890,c:-1.1},{n:'INFY',p:1890,c:-0.4},{n:'WIPRO',p:567,c:-0.4}],REALTY:[{n:'DLF',p:789,c:2.1},{n:'GODREJ',p:2345,c:1.8}],AUTO:[{n:'MARUTI',p:11200,c:0.9},{n:'TATA MOTORS',p:890,c:1.8}]};
function rIdx(){document.getElementById('idxRow').innerHTML=IDX.map((x,i)=>`<div class="ibox" onclick="oIdx(${i})"><div class="i-name">${x.n}</div><div class="i-val">${x.v.toLocaleString()}</div><div class="i-chg ${x.c>=0?'up':'dn'}">${x.c>=0?'▲':'▼'}${Math.abs(x.p)}%</div></div>`).join('')+`<div class="ibox" style="border-color:var(--gold)" onclick="location='page7_admin.html'"><div class="i-name">PROFILE</div><div style="font-size:22px;margin-top:2px">👤</div></div>`;}
function rQ(){document.getElementById('qRow').innerHTML=QK.map(q=>`<div class="qbox"><div class="q-lbl">${q.l}</div><div class="q-val">${q.v}</div><div class="q-note">${q.n}</div></div>`).join('');}
function rSec(){document.getElementById('secGrid').innerHTML=SECS.map(s=>`<div class="sbox ${s.c}" onclick="oDrill('${s.n}')"><div class="s-nm">${s.n}</div><div class="s-st"><span class="sup">▲${s.u}</span><span class="sdn">▼${s.d}</span></div></div>`).join('');}
function rTick(){const t=IDX.map(x=>`<span class="ti">🔱 ${x.n} <span class="${x.c>=0?'up':'dn'}">${x.v.toLocaleString()} ${x.c>=0?'▲':'▼'}${Math.abs(x.p)}%</span></span>`).join('');document.getElementById('tickEl').innerHTML=t+t;}
function oIdx(i){const x=IDX[i];document.getElementById('mNm').textContent=x.n;document.getElementById('mO').textContent=x.o.toLocaleString();document.getElementById('mH').textContent=x.h.toLocaleString();document.getElementById('mL').textContent=x.l.toLocaleString();document.getElementById('mP').textContent=x.pr.toLocaleString();document.getElementById('idxM').classList.add('show');}
function oDrill(s){document.getElementById('dNm').textContent=s;const st=SS[s]||[{n:'STOCK A',p:1200,c:1.2},{n:'STOCK B',p:800,c:-0.5}];document.getElementById('dList').innerHTML=st.map(x=>`<div class="ditem ${x.c>=0?'dg':'dr'}"><div style="font-size:14px;font-weight:700;font-family:'Rajdhani',sans-serif">${x.n}</div><div style="text-align:right"><div style="font-size:15px;font-weight:700;color:${x.c>=0?'#00c853':'#ff3d3d'};font-family:'Orbitron',sans-serif">₹${x.p.toLocaleString()}</div><div style="font-size:10px;color:${x.c>=0?'#00c853':'#ff3d3d'};font-family:'Rajdhani',sans-serif">${x.c>=0?'+':''}${x.c}%</div></div></div>`).join('');document.getElementById('drillEl').classList.add('show');}
function cm(id){document.getElementById(id).classList.remove('show');}
function doLogout(){if(confirm('Logout?'))window.location.href='index.html';}
function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2200);}
setInterval(()=>{IDX.forEach(x=>{x.v+=Math.round((Math.random()-0.48)*15);});rIdx();rTick();},5000);
rIdx();rQ();rSec();rTick();
</script>
</body>
</html>
